<p class="font-body text-xs tracking-wider text-outline uppercase">Drag and drop or browse gallery</p>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>

<div class="absolute bottom-12 left-12 right-12 h-px bg-outline-variant/20"></div>
</div>

<p class="font-body text-[10px] uppercase tracking-[0.2em] text-outline">Digital Archive Entry No. 042</p>

</div>

<div>
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-outline mb-6">Scent Profile</label>
<div class="flex flex-wrap gap-3">
<!-- Woody Chip -->
<button class="px-5 py-2.5 bg-secondary-container text-on-secondary-container text-[11px] font-label uppercase tracking-widest hover:opacity-80 transition-opacity">Woody</button>
<!-- Citrus Chip -->
<button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant text-[11px] font-label uppercase tracking-widest hover:bg-secondary-container hover:text-on-secondary-container transition-all">Citrus</button>
<!-- Floral Chip -->
<button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant text-[11px] font-label uppercase tracking-widest hover:bg-secondary-container hover:text-on-secondary-container transition-all">Floral</button>
<!-- Oriental Chip -->
<button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant text-[11px] font-label uppercase tracking-widest hover:bg-secondary-container hover:text-on-secondary-container transition-all">Oriental</button>

<span class="material-symbols-outlined cursor-pointer text-xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined cursor-pointer text-xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined cursor-pointer text-xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined cursor-pointer text-xl text-outline-variant/30" data-icon="star">star</span>

</div>
